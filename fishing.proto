syntax = "proto3";

package fishingapp;

import "google/protobuf/empty.proto";

message User {
  int32 id          = 1;
  double x          = 2;
  double y          = 3;
  bool is_fishing   = 4;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}
message LoginResponse {
  string token = 1;
}

message UpdateLocationRequest {
  string jwt = 1;
  double x   = 2;
  double y   = 3;
}
message UpdateLocationResponse {
  bool success = 1;
}

message StartFishingRequest { string jwt = 1; }

message Fish {
  int32 fish_id    = 1;
  string fish_dna  = 2;
  int32 fish_level = 3;
}

message EmptyRequest {}
message CurrentUsersResponse { int32 count = 1; }

message InventoryRequest {}
message InventoryResponse { repeated Fish fish = 1; }

message ImageRequest {}
message ImageResponse { bytes image_data = 1; }

// --- 2PC Messages ---

enum Vote {
  VOTE_COMMIT = 0;
  VOTE_ABORT = 1;
}

enum Decision {
  DECISION_COMMIT = 0;
  DECISION_ABORT = 1;
}

message VoteRequest {
  string transaction_id = 1;
  string node_id = 2; // sender node id
}

message VoteResponse {
  Vote vote = 1;
  string node_id = 2; // responder node id
}

message GlobalDecisionRequest {
  string transaction_id = 1;
  Decision decision = 2;
  string node_id = 3; // sender node id
}

message GlobalDecisionResponse {
  bool ack = 1;
  string node_id = 2; // responder node id
}

message InternalPrepareRequest {
  string transaction_id = 1;
  string node_id = 2;
}

message InternalPrepareResponse {
  Vote vote = 1;
}

message InternalDecisionRequest {
  string transaction_id = 1;
  Decision decision = 2;
  string node_id = 3;
}

service FishingService {
  rpc ListUsers (google.protobuf.Empty) returns (stream User);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc UpdateLocation (stream UpdateLocationRequest) returns (UpdateLocationResponse);
  rpc StartFishing (StartFishingRequest) returns (stream Fish);
  rpc CurrentUsers (EmptyRequest) returns (stream CurrentUsersResponse);
  rpc Inventory (InventoryRequest) returns (InventoryResponse);
  rpc GetImage (ImageRequest) returns (ImageResponse);
}

service VotingService {
  rpc Prepare (VoteRequest) returns (VoteResponse);
  rpc CommitTransaction (google.protobuf.Empty) returns (google.protobuf.Empty);
}

service DecisionService {
  rpc GlobalDecision (GlobalDecisionRequest) returns (GlobalDecisionResponse);
  // Internal RPC for internal communication between phases on same node
  rpc InternalPrepare (InternalPrepareRequest) returns (InternalPrepareResponse);
  rpc InternalDecision (InternalDecisionRequest) returns (google.protobuf.Empty);
}
