# docker-compose.yml

version: "3.9"

services:
  # Service definitions – one per server instance
  fishing1:
    build: .
    command: ["python", "server.py", "50051", "1.JPG"]
    ports:
      - "50051:50051"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"

